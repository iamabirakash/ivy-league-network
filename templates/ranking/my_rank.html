{% extends 'base.html' %}
{% block title %}My Rank{% endblock %}
{% block content %}
<section class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="font-display text-3xl font-bold text-navy mb-6">My Rank</h1>
    <div class="bg-white border border-cream-dk rounded-xl p-6 space-y-2">
        <p class="text-navy"><strong>Current Rank:</strong> {{ rank }}</p>
        <p class="text-navy"><strong>Total Users:</strong> {{ total_users }}</p>
        <p class="text-navy"><strong>Percentile:</strong> {{ percentile }}%</p>
    </div>
</section>
{% endblock %}
