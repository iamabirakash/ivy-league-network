{% extends 'base.html' %}
{% block title %}Students{% endblock %}
{% block content %}
<h3>Students</h3>
<form method="get" class="mb-3">
    <input type="text" name="search" value="{{ search_query }}" class="form-control" placeholder="Search users">
</form>
<div class="list-group">
    {% for person in users %}
    <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" href="{% url 'accounts:user_detail' person.username %}">
        <span>{{ person.get_full_name|default:person.username }} - {{ person.university }}</span>
        <span class="badge bg-warning text-dark">InCoScore {{ person.incoscore }}</span>
    </a>
    {% empty %}
    <div class="list-group-item">No users found.</div>
    {% endfor %}
</div>
{% endblock %}
