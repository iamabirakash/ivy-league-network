{% extends 'base.html' %}
{% block title %}Community{% endblock %}
{% block content %}
<section class="max-w-5xl mx-auto px-4 py-10">
    <div class="flex items-center justify-between mb-5">
        <h1 class="font-display text-3xl font-bold text-navy">Community Posts</h1>
        <div class="flex items-center gap-2">
            <a href="{% url 'community:group_list' %}" class="border border-cream-dk text-navy font-semibold px-4 py-2 rounded-lg hover:bg-cream">Groups</a>
            <a href="{% url 'community:create_post' %}" class="bg-gold text-navy font-semibold px-4 py-2 rounded-lg hover:bg-gold-lt">New Post</a>
        </div>
    </div>
    <form method="get" class="mb-5">
        <input name="search" value="{{ request.GET.search }}" placeholder="Search posts"
               class="w-full bg-cream border border-cream-dk rounded-lg px-4 py-2.5 text-sm text-navy focus:outline-none focus:ring-2 focus:ring-gold/30">
    </form>
    <div class="bg-white border border-cream-dk rounded-xl divide-y divide-cream-dk">
        {% for post in posts %}
        <a href="{% url 'community:post_detail' post.id %}" class="block px-5 py-4 hover:bg-cream transition-colors">
            <h3 class="text-base font-semibold text-navy">{{ post.title }}</h3>
            <p class="text-xs text-slate mt-1">By {{ post.user.username }} | {{ post.created_at|date:"M d, Y" }}</p>
        </a>
        {% empty %}
        <div class="px-5 py-4 text-slate">No posts found.</div>
        {% endfor %}
    </div>
</section>
{% endblock %}
