{% extends 'base.html' %}
{% block title %}Create Post{% endblock %}
{% block content %}
<section class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="font-display text-3xl font-bold text-navy mb-6">Create Post</h1>
    <form method="post" class="bg-white border border-cream-dk rounded-xl p-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-semibold text-navy mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-sm text-red-600 mt-1">{{ field.errors|striptags }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="bg-gold hover:bg-gold-lt text-navy font-semibold px-5 py-2.5 rounded-lg">Publish</button>
    </form>
</section>
{% endblock %}
