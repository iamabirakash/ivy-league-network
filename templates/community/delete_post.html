{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<h3>Delete Post</h3>
<p>Are you sure you want to delete: <strong>{{ post.title }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'community:post_detail' post.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
