{% extends 'base.html' %}
{% block title %}Groups{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Domain Groups</h3>
    <a href="{% url 'community:create_group' %}" class="btn btn-primary">Create Group</a>
</div>
<div class="row">
    {% for group in groups %}
    <div class="col-md-4 mb-3">
        <div class="card h-100">
            <div class="card-body">
                <h5>{{ group.name }}</h5>
                <p>{{ group.description|truncatechars:100 }}</p>
                <a href="{% url 'community:group_detail' group.id %}" class="btn btn-outline-primary btn-sm">Open</a>
            </div>
        </div>
    </div>
    {% empty %}
    <p>No groups found.</p>
    {% endfor %}
</div>
{% endblock %}
